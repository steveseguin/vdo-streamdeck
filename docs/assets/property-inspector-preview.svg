<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
	<title id="title">VDO.Ninja Stream Deck property inspector preview</title>
	<desc id="desc">A preview of the Stream Deck property inspector showing the compact connection status bar, collapsed setup panel, and Guest Command settings.</desc>
	<defs>
		<linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
			<stop offset="0" stop-color="#111827" />
			<stop offset="1" stop-color="#030712" />
		</linearGradient>
		<linearGradient id="chrome" x1="0" x2="0" y1="0" y2="1">
			<stop offset="0" stop-color="#1f2937" />
			<stop offset="1" stop-color="#0b1220" />
		</linearGradient>
		<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
			<feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.36" />
		</filter>
		<style>
			.text { font-family: "Segoe UI", Arial, sans-serif; fill: #e5e7eb; }
			.heading { font-size: 24px; font-weight: 800; }
			.label { font-size: 15px; font-weight: 700; fill: #cbd5e1; }
			.value { font-size: 17px; fill: #f8fafc; }
			.hint { font-size: 13px; fill: #94a3b8; }
			.small { font-size: 12px; fill: #94a3b8; }
			.code { font-family: Consolas, monospace; font-size: 14px; fill: #dbeafe; }
			.rowText { font-size: 15px; fill: #dbeafe; }
			.button { font-size: 14px; font-weight: 700; fill: #e5e7eb; text-anchor: middle; }
		</style>
	</defs>

	<rect width="1200" height="760" fill="url(#bg)" />

	<g filter="url(#shadow)">
		<rect x="76" y="56" width="1048" height="648" rx="24" fill="#0f172a" stroke="#263449" />
		<rect x="76" y="56" width="1048" height="58" rx="24" fill="url(#chrome)" />
		<rect x="76" y="90" width="1048" height="24" fill="#111827" />
		<circle cx="110" cy="86" r="7" fill="#ef4444" />
		<circle cx="134" cy="86" r="7" fill="#f59e0b" />
		<circle cx="158" cy="86" r="7" fill="#22c55e" />
		<text class="text" x="210" y="94" font-size="21" font-weight="800">VDO.Ninja Stream Deck Plugin</text>

		<g transform="translate(108 138)">
			<rect x="0" y="0" width="304" height="526" rx="16" fill="#111827" stroke="#243244" />
			<text class="heading text" x="24" y="42">Actions</text>
			<text class="small" x="24" y="68">Monochrome action-list glyphs</text>

			<g transform="translate(20 96)">
				<rect x="0" y="0" width="264" height="42" rx="8" fill="#0b1220" />
				<path d="M20 15h12a5 5 0 0 1 5 5v2l6-4v15l-6-4v2a5 5 0 0 1-5 5H20a5 5 0 0 1-5-5V20a5 5 0 0 1 5-5Z" fill="#ffffff" />
				<text class="rowText" x="62" y="27">Connection Status</text>
			</g>
			<g transform="translate(20 150)">
				<rect x="0" y="0" width="264" height="42" rx="8" fill="#0b1220" />
				<path d="M29 10a7 7 0 0 1 7 7v6a7 7 0 0 1-14 0v-6a7 7 0 0 1 7-7Zm-12 13h4a8 8 0 0 0 16 0h4a12 12 0 0 1-10 12v6h-4v-6a12 12 0 0 1-10-12Z" fill="#ffffff" />
				<text class="rowText" x="62" y="27">Local Control</text>
			</g>
			<g transform="translate(20 204)">
				<rect x="0" y="0" width="264" height="42" rx="8" fill="#172554" stroke="#38bdf8" />
				<path d="M29 10a8 8 0 1 1 0 16 8 8 0 0 1 0-16ZM14 39c1-8 7-12 15-12s14 4 15 12H14Z" fill="#ffffff" />
				<text class="rowText" x="62" y="27">Guest Command</text>
			</g>
			<g transform="translate(20 258)">
				<rect x="0" y="0" width="264" height="42" rx="8" fill="#0b1220" />
				<path d="M18 11h5v28h-5V11Zm-7 10h19v5H11v-5Zm25-10h5v28h-5V11Zm-7 18h19v5H29v-5Z" fill="#ffffff" />
				<text class="rowText" x="62" y="27">Mixer Control</text>
			</g>
			<g transform="translate(20 312)">
				<rect x="0" y="0" width="264" height="42" rx="8" fill="#0b1220" />
				<path d="m29 8 7 9H22l7-9Zm0 34-7-9h14l-7 9ZM8 25l9-7v14l-9-7Zm42 0-9 7V18l9 7Z" fill="#ffffff" />
				<text class="rowText" x="62" y="27">PTZ Dial</text>
			</g>
			<g transform="translate(20 366)">
				<rect x="0" y="0" width="264" height="42" rx="8" fill="#0b1220" />
				<path d="M13 14h34v5H13v-5Zm0 13h34v5H13v-5Zm12-20h5v19h-5V7Zm12 18h5v19h-5V25Z" fill="#ffffff" />
				<text class="rowText" x="62" y="27">Value Dial</text>
			</g>
			<g transform="translate(20 440)">
				<rect x="0" y="0" width="264" height="48" rx="10" fill="#052e1a" stroke="#166534" />
				<circle cx="25" cy="24" r="7" fill="#35d07f" />
				<text class="text" x="46" y="30" font-size="15" font-weight="700">Connected to VDO.Ninja</text>
			</g>
		</g>

		<g transform="translate(452 138)">
			<rect x="0" y="0" width="632" height="526" rx="16" fill="#111827" stroke="#243244" />
			<rect x="24" y="26" width="584" height="48" rx="10" fill="#052e1a" stroke="#166534" />
			<circle cx="48" cy="50" r="8" fill="#35d07f" />
			<text class="value" x="68" y="56">VDO.Ninja page answered.</text>

			<rect x="24" y="94" width="584" height="42" rx="8" fill="#0b1220" stroke="#263449" />
			<path d="M47 112 L55 120 L47 128" fill="none" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
			<text class="text" x="76" y="121" font-size="16" font-weight="800">VDO.Ninja connection setup</text>
			<text class="hint" x="368" y="121">collapsed for configured actions</text>

			<text class="heading text" x="24" y="180">Guest Command</text>

			<g transform="translate(24 210)">
				<text class="label" x="0" y="0">Command</text>
				<rect x="0" y="14" width="274" height="40" rx="8" fill="#020617" stroke="#334155" />
				<text class="value" x="16" y="40">Activate Guest</text>
				<path d="M246 29 L254 37 L262 29" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />

				<text class="label" x="310" y="0">Target</text>
				<rect x="310" y="14" width="274" height="40" rx="8" fill="#020617" stroke="#334155" />
				<text class="value" x="326" y="40">Stream ID</text>
				<path d="M556 29 L564 37 L572 29" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />
			</g>

			<g transform="translate(24 296)">
				<text class="label" x="0" y="0">Stream</text>
				<rect x="0" y="14" width="584" height="40" rx="8" fill="#020617" stroke="#334155" />
				<text class="value" x="16" y="40">G2 - Jordan - held</text>
				<path d="M556 29 L564 37 L572 29" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />

				<rect x="0" y="70" width="144" height="36" rx="8" fill="#1d4ed8" />
				<text class="button" x="72" y="94">Refresh Targets</text>
				<rect x="158" y="70" width="112" height="36" rx="8" fill="#263449" />
				<text class="button" x="214" y="94">Manual ID</text>
				<text class="hint" x="292" y="93">A dropdown pick clears any saved manual ID.</text>
			</g>

			<g transform="translate(24 440)">
				<text class="label" x="0" y="0">Title template</text>
				<rect x="0" y="14" width="360" height="40" rx="8" fill="#020617" stroke="#334155" />
				<text class="code" x="16" y="40">{slot} {label} {command}</text>

				<rect x="394" y="21" width="20" height="20" rx="4" fill="#35d07f" />
				<path d="M399 31 L405 37 L419 23" stroke="#052e1a" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" />
				<text class="value" x="426" y="38">Double-press dangerous actions</text>
			</g>
		</g>
	</g>
</svg>

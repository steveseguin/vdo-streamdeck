<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
	<title id="title">VDO.Ninja Stream Deck property inspector preview</title>
	<desc id="desc">A preview of the Stream Deck property inspector showing API setup, mixer control settings, guest targeting, and PTZ guidance.</desc>
	<defs>
		<linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
			<stop offset="0" stop-color="#111827" />
			<stop offset="1" stop-color="#020617" />
		</linearGradient>
		<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
			<feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35" />
		</filter>
		<style>
			.text { font-family: "Segoe UI", Arial, sans-serif; fill: #e5e7eb; }
			.label { font-size: 15px; font-weight: 700; fill: #cbd5e1; }
			.hint { font-size: 14px; fill: #94a3b8; }
			.value { font-size: 17px; fill: #e5e7eb; }
			.code { font-family: Consolas, monospace; font-size: 15px; fill: #dbeafe; }
			.small { font-size: 13px; fill: #94a3b8; }
		</style>
	</defs>
	<rect width="1200" height="760" fill="url(#bg)" />
	<circle cx="160" cy="90" r="220" fill="#22c55e" opacity="0.07" />
	<circle cx="1040" cy="690" r="260" fill="#0ea5e9" opacity="0.08" />

	<g filter="url(#shadow)">
		<rect x="82" y="70" width="1036" height="620" rx="28" fill="#0f172a" stroke="#263449" />
		<rect x="82" y="70" width="1036" height="62" rx="28" fill="#111827" />
		<rect x="82" y="104" width="1036" height="28" fill="#111827" />
		<circle cx="118" cy="101" r="8" fill="#ef4444" />
		<circle cx="144" cy="101" r="8" fill="#f59e0b" />
		<circle cx="170" cy="101" r="8" fill="#22c55e" />
		<text class="text" x="220" y="108" font-size="22" font-weight="800">VDO.Ninja - Mixer Control</text>

		<g transform="translate(118 164)">
			<rect x="0" y="0" width="322" height="474" rx="18" fill="#111827" stroke="#243244" />
			<text class="text" x="24" y="42" font-size="24" font-weight="800">Connection</text>
			<rect x="24" y="66" width="274" height="48" rx="12" fill="#052e1a" stroke="#166534" />
			<circle cx="48" cy="90" r="8" fill="#35d07f" />
			<text class="value" x="68" y="96">VDO.Ninja page answered</text>

			<text class="label" x="24" y="154">Private API key</text>
			<rect x="24" y="168" width="274" height="38" rx="8" fill="#020617" stroke="#334155" />
			<text class="code" x="40" y="193">my-production-key</text>

			<text class="label" x="24" y="240">Page type</text>
			<rect x="24" y="254" width="274" height="38" rx="8" fill="#020617" stroke="#334155" />
			<text class="value" x="40" y="279">Director room</text>

			<text class="label" x="24" y="326">Generated VDO.Ninja link</text>
			<rect x="24" y="340" width="274" height="68" rx="8" fill="#020617" stroke="#334155" />
			<text class="code" x="40" y="367">https://vdo.ninja/</text>
			<text class="code" x="40" y="391">?director=ROOM&amp;api=KEY</text>

			<rect x="24" y="430" width="128" height="34" rx="8" fill="#1d4ed8" />
			<text class="text" x="56" y="453" font-size="15" font-weight="700">Copy URL</text>
			<rect x="170" y="430" width="128" height="34" rx="8" fill="#166534" />
			<text class="text" x="207" y="453" font-size="15" font-weight="700">Test</text>
		</g>

		<g transform="translate(470 164)">
			<rect x="0" y="0" width="320" height="474" rx="18" fill="#111827" stroke="#243244" />
			<text class="text" x="24" y="42" font-size="24" font-weight="800">Mixer Control</text>

			<text class="label" x="24" y="82">Control</text>
			<rect x="24" y="96" width="272" height="38" rx="8" fill="#020617" stroke="#334155" />
			<text class="value" x="40" y="121">Assign guest to mixer slot</text>

			<text class="label" x="24" y="166">Guest source</text>
			<rect x="24" y="180" width="272" height="38" rx="8" fill="#020617" stroke="#334155" />
			<text class="value" x="40" y="205">Guest position</text>

			<text class="label" x="24" y="250">Guest position</text>
			<rect x="24" y="264" width="120" height="38" rx="8" fill="#020617" stroke="#334155" />
			<text class="value" x="42" y="289">1</text>

			<text class="label" x="176" y="250">Destination mixer slot</text>
			<rect x="176" y="264" width="120" height="38" rx="8" fill="#020617" stroke="#334155" />
			<text class="value" x="194" y="289">2</text>

			<rect x="24" y="326" width="272" height="58" rx="10" fill="#0b1220" stroke="#243244" />
			<text class="hint" x="42" y="351">Slot 0 unsets the guest slot.</text>
			<text class="hint" x="42" y="373">Use /mixer or &amp;slotmode=1.</text>

			<text class="label" x="24" y="424">Safety</text>
			<rect x="24" y="440" width="18" height="18" rx="4" fill="#35d07f" />
			<path d="M29 449 L35 455 L49 441" stroke="#052e1a" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" />
			<text class="value" x="56" y="456">Require second press for transfer all</text>
		</g>

		<g transform="translate(820 164)">
			<rect x="0" y="0" width="262" height="474" rx="18" fill="#111827" stroke="#243244" />
			<text class="text" x="24" y="42" font-size="24" font-weight="800">Action Set</text>
			<g transform="translate(24 70)">
				<rect x="0" y="0" width="214" height="34" rx="17" fill="#052e1a" />
				<text class="text" x="18" y="23" font-size="15" font-weight="700">Connection status</text>
				<rect x="0" y="48" width="214" height="34" rx="17" fill="#064e3b" />
				<text class="text" x="18" y="71" font-size="15" font-weight="700">Local controls</text>
				<rect x="0" y="96" width="214" height="34" rx="17" fill="#312e81" />
				<text class="text" x="18" y="119" font-size="15" font-weight="700">Guest commands</text>
				<rect x="0" y="144" width="214" height="34" rx="17" fill="#581c87" />
				<text class="text" x="18" y="167" font-size="15" font-weight="700">Scene toggles</text>
				<rect x="0" y="192" width="214" height="34" rx="17" fill="#065f46" />
				<text class="text" x="18" y="215" font-size="15" font-weight="700">Mixer layouts and slots</text>
				<rect x="0" y="240" width="214" height="34" rx="17" fill="#075985" />
				<text class="text" x="18" y="263" font-size="15" font-weight="700">PTZ keys and dials</text>
				<rect x="0" y="288" width="214" height="34" rx="17" fill="#14532d" />
				<text class="text" x="18" y="311" font-size="15" font-weight="700">Value dials</text>
				<rect x="0" y="336" width="214" height="34" rx="17" fill="#78350f" />
				<text class="text" x="18" y="359" font-size="15" font-weight="700">Custom API payloads</text>
			</g>
			<rect x="24" y="430" width="214" height="30" rx="15" fill="#0b1220" stroke="#334155" />
			<text class="small" x="42" y="450">Live state from getDetails</text>
		</g>
	</g>
</svg>
